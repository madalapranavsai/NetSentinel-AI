apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: netsentinel-ai
spec:
  template:
    spec:
      containerConcurrency: 20
      containers:
      - image: us-central1-docker.pkg.dev/sincere-lexicon-485014-k1/cloud-run-source-deploy/netsentinel-ai:latest
        resources:
          limits:
            cpu: "2"
            memory: "4Gi"
        env:
        - name: GEMINI_API_KEY
          value: "YOUR_API_KEY_HERE" # Placeholder: In production, consider using Secret Manager
        - name: ENVIRONMENT
          value: "production"
