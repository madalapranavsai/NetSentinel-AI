<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetSentinel AI - Pending Approvals</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d0f14;
            --card-bg: rgba(22, 28, 45, 0.4);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --primary-glow: rgba(59, 130, 246, 0.15);
            --success: #10b981;
            --success-glow: rgba(16, 185, 129, 0.15);
            --danger: #ef4444;
            --danger-glow: rgba(239, 68, 68, 0.15);
            --warning: #f59e0b;
            --warning-glow: rgba(245, 158, 11, 0.15);
            --transition-speed: 0.3s;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(59, 130, 246, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(16, 185, 129, 0.05) 0%, transparent 40%);
            padding: 2rem 1rem;
        }

        .container {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--card-border);
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2.25rem;
            font-weight: 700;
            background: linear-gradient(135deg, #60a5fa 0%, #34d399 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.025em;
        }

        .user-config {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            padding: 0.5rem 1rem;
            border-radius: 9999px;
            backdrop-filter: blur(12px);
        }

        .user-config label {
            font-size: 0.875rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .user-config input {
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.875rem;
            font-weight: 600;
            outline: none;
            width: 100px;
            border-bottom: 1px dashed var(--text-secondary);
        }

        .user-config input:focus {
            border-bottom-color: #60a5fa;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
        }

        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 1.25rem;
            backdrop-filter: blur(12px);
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
        }

        .stat-card .label {
            font-size: 0.875rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .stat-card .value {
            font-size: 1.75rem;
            font-weight: 700;
            font-family: 'Outfit', sans-serif;
        }

        .list-container {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        .list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .list-header h2 {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .status-badge {
            font-size: 0.75rem;
            font-weight: 600;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            display: inline-flex;
            align-items: center;
            gap: 0.375rem;
        }

        .status-badge::before {
            content: '';
            width: 6px;
            height: 6px;
            border-radius: 50%;
            display: inline-block;
        }

        .status-badge.polling {
            background: rgba(59, 130, 246, 0.15);
            color: #60a5fa;
        }

        .status-badge.polling::before {
            background: #3b82f6;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.85); opacity: 0.5; }
            50% { transform: scale(1.15); opacity: 1; }
            100% { transform: scale(0.85); opacity: 0.5; }
        }

        .no-approvals {
            background: var(--card-bg);
            border: 1px dashed var(--card-border);
            border-radius: 20px;
            padding: 4rem 2rem;
            text-align: center;
            color: var(--text-secondary);
            font-size: 1.1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            backdrop-filter: blur(12px);
        }

        .no-approvals svg {
            width: 48px;
            height: 48px;
            stroke: var(--text-secondary);
            opacity: 0.6;
        }

        .approval-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
            backdrop-filter: blur(12px);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            transition: transform var(--transition-speed), border-color var(--transition-speed);
            position: relative;
            overflow: hidden;
        }

        .approval-card:hover {
            transform: translateY(-2px);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .approval-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
        }

        .approval-card.high::before { background: var(--danger); }
        .approval-card.medium::before { background: var(--warning); }
        .approval-card.low::before { background: var(--success); }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .card-meta {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .card-title {
            font-size: 0.875rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .approval-id {
            font-family: monospace;
            font-size: 0.75rem;
            background: rgba(255, 255, 255, 0.05);
            padding: 0.125rem 0.375rem;
            border-radius: 4px;
            width: fit-content;
        }

        .risk-badge {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            padding: 0.25rem 0.75rem;
            border-radius: 6px;
            letter-spacing: 0.05em;
        }

        .risk-badge.high { background: var(--danger-glow); color: #f87171; }
        .risk-badge.medium { background: var(--warning-glow); color: #fbbf24; }
        .risk-badge.low { background: var(--success-glow); color: #34d399; }

        .card-body {
            font-size: 1.05rem;
            line-height: 1.5;
            color: #e2e8f0;
            font-weight: 500;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 1rem;
        }

        .timestamp {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .actions {
            display: flex;
            gap: 0.75rem;
        }

        .btn {
            font-family: inherit;
            font-size: 0.875rem;
            font-weight: 600;
            padding: 0.625rem 1.25rem;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            transition: all var(--transition-speed) ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-approve {
            background: var(--success);
            color: #ffffff;
            box-shadow: 0 4px 14px 0 rgba(16, 185, 129, 0.3);
        }

        .btn-approve:hover {
            background: #059669;
            transform: scale(1.02);
        }

        .btn-deny {
            background: var(--danger);
            color: #ffffff;
            box-shadow: 0 4px 14px 0 rgba(239, 68, 68, 0.3);
        }

        .btn-deny:hover {
            background: #dc2626;
            transform: scale(1.02);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        @media (max-width: 640px) {
            header {
                flex-direction: column;
                align-items: flex-start;
                gap: 1rem;
            }
            .user-config {
                align-self: stretch;
                justify-content: space-between;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div>
                <h1>NetSentinel Coordinator</h1>
                <p style="color: var(--text-secondary); font-size: 0.9rem; margin-top: 0.25rem;">Human-in-the-Loop Approval Console</p>
            </div>
            <div class="user-config">
                <label for="decidedBy">Operator:</label>
                <input type="text" id="decidedBy" value="admin">
            </div>
        </header>

        <section class="stats">
            <div class="stat-card">
                <span class="label">Pending Decisions</span>
                <span class="value" id="pending-count">0</span>
            </div>
            <div class="stat-card">
                <span class="label">Status</span>
                <div style="display: flex; align-items: center; margin-top: auto;">
                    <span class="status-badge polling">Live Monitoring</span>
                </div>
            </div>
        </section>

        <section class="list-container">
            <div class="list-header">
                <h2>Pending Actions</h2>
            </div>
            <div id="approvals-list">
                <!-- Dynamic cards insertion -->
                <div class="no-approvals">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12c0 1.268-.63 2.39-1.593 3.068a3.745 3.745 0 01-1.043 3.296 3.745 3.745 0 01-3.296 1.043A3.745 3.745 0 0112 21c-1.268 0-2.39-.63-3.068-1.593a3.746 3.746 0 01-3.296-1.043 3.745 3.745 0 01-1.043-3.296A3.745 3.745 0 013 12c0-1.268.63-2.39 1.593-3.068a3.745 3.745 0 011.043-3.296 3.746 3.746 0 013.296-1.043A3.746 3.746 0 0112 3c1.268 0 2.39.63 3.068 1.593a3.746 3.746 0 013.296 1.043 3.746 3.746 0 011.043 3.296A3.745 3.745 0 0121 12z" />
                    </svg>
                    <p>All clear! No operations are currently awaiting human approval.</p>
                </div>
            </div>
        </section>
    </div>

    <script>
        const API_BASE = window.location.origin;
        let lastApprovals = [];

        async function fetchPendingApprovals() {
            try {
                const response = await fetch(`${API_BASE}/approvals/pending`);
                if (!response.ok) throw new Error("Failed to fetch pending approvals");
                const approvals = await response.json();
                
                updateApprovalsList(approvals);
            } catch (err) {
                console.error("Error polling approvals:", err);
            }
        }

        async function decideApproval(approvalId, decision) {
            const decidedBy = document.getElementById("decidedBy").value || "admin";
            const btnApprove = document.getElementById(`btn-approve-${approvalId}`);
            const btnDeny = document.getElementById(`btn-deny-${approvalId}`);
            
            if (btnApprove) btnApprove.disabled = true;
            if (btnDeny) btnDeny.disabled = true;

            try {
                const response = await fetch(`${API_BASE}/approvals/${approvalId}/decide`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ decision, decided_by: decidedBy })
                });

                if (!response.ok) throw new Error("Failed to submit decision");
                
                // Immediately fetch updated list
                await fetchPendingApprovals();
            } catch (err) {
                alert(`Error: ${err.message}`);
                if (btnApprove) btnApprove.disabled = false;
                if (btnDeny) btnDeny.disabled = false;
            }
        }

        function formatTimestamp(isoString) {
            if (!isoString) return '';
            const date = new Date(isoString);
            return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' }) + ' ' + date.toLocaleDateString();
        }

        function updateApprovalsList(approvals) {
            const listDiv = document.getElementById("approvals-list");
            document.getElementById("pending-count").innerText = approvals.length;

            if (approvals.length === 0) {
                listDiv.innerHTML = `
                    <div class="no-approvals">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12c0 1.268-.63 2.39-1.593 3.068a3.745 3.745 0 01-1.043 3.296 3.745 3.745 0 01-3.296 1.043A3.745 3.745 0 0112 21c-1.268 0-2.39-.63-3.068-1.593a3.746 3.746 0 01-3.296-1.043 3.745 3.745 0 01-1.043-3.296A3.745 3.745 0 013 12c0-1.268.63-2.39 1.593-3.068a3.745 3.745 0 011.043-3.296 3.746 3.746 0 013.296-1.043A3.746 3.746 0 0112 3c1.268 0 2.39.63 3.068 1.593a3.746 3.746 0 013.296 1.043 3.746 3.746 0 011.043 3.296A3.745 3.745 0 0121 12z" />
                        </svg>
                        <p>All clear! No operations are currently awaiting human approval.</p>
                    </div>
                `;
                return;
            }

            // Create cards HTML
            let html = '<div style="display: flex; flex-direction: column; gap: 1.25rem;">';
            approvals.forEach(appr => {
                const riskClass = appr.risk_level ? appr.risk_level.toLowerCase() : 'low';
                html += `
                    <div class="approval-card ${riskClass}" id="card-${appr.approval_id}">
                        <div class="card-header">
                            <div class="card-meta">
                                <span class="card-title">Pending Action</span>
                                <span class="approval-id">ID: ${appr.approval_id}</span>
                                ${appr.incident_id ? `<span class="timestamp" style="font-family: monospace; margin-top: 2px;">Incident: ${appr.incident_id}</span>` : ''}
                            </div>
                            <span class="risk-badge ${riskClass}">${appr.risk_level || 'LOW'}</span>
                        </div>
                        <div class="card-body">
                            ${appr.action_summary}
                        </div>
                        <div class="card-footer">
                            <span class="timestamp">Requested: ${formatTimestamp(appr.created_at)}</span>
                            <div class="actions">
                                <button class="btn btn-deny" id="btn-deny-${appr.approval_id}" onclick="decideApproval('${appr.approval_id}', 'deny')">Deny</button>
                                <button class="btn btn-approve" id="btn-approve-${appr.approval_id}" onclick="decideApproval('${appr.approval_id}', 'approve')">Approve</button>
                            </div>
                        </div>
                    </div>
                `;
            });
            html += '</div>';
            listDiv.innerHTML = html;
        }

        // Start polling
        fetchPendingApprovals();
        setInterval(fetchPendingApprovals, 3000);
    </script>
</body>
</html>
